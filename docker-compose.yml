services:

  postgres:
    image: postgres:15-alpine
    container_name: performance_tracker_db
    environment:
      POSTGRES_DB: performance_tracker
      POSTGRES_USER: tracker_user
      POSTGRES_PASSWORD: tracker_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=256MB
      -c work_mem=16MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker_user -d performance_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tracker_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: performance_tracker_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/performance_tracker
      SPRING_DATASOURCE_USERNAME: tracker_user
      SPRING_DATASOURCE_PASSWORD: tracker_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs
    networks:
      - tracker_network
    restart: on-failure:3

networks:
  tracker_network:
    driver: bridge

volumes:
  postgres_data:
  app_logs: